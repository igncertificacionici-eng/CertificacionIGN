<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Certificación IGN</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
    header { background: #002b5c; color: #fff; padding: 25px; }
    header h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; }
    main { max-width: 750px; margin: 40px auto; }
    .card { border: none; box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .form-label { font-weight: 600; color: #002b5c; }
    .btn-primary { background: #002b5c; border: none; font-weight: 600; }
    .btn-primary:hover { background: #001f40; }
    .section-title { color: #444; font-size: 1.1rem; margin-bottom: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <header class="text-center">
    <h1>Certificación Geodésica IGN</h1>
    <p class="mb-0" style="font-size:0.9rem; font-weight:300;">Ingeniería, Consultoría e Investigaciones</p>
  </header>
  <main>
    <div class="card p-4">
      <h2 class="mb-4 text-primary">Formulario de Evidencias</h2>
      <form id="ignForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="codigo" class="form-label">Código del punto:</label>
          <input type="text" id="codigo" name="codigo" class="form-control" required>
          <div class="invalid-feedback">Debes ingresar un código.</div>
        </div>

        <h5 class="section-title">Carga de archivos</h5>
        <div class="mb-3"><label class="form-label">Proceso de monumentación:</label><input type="file" id="2. Proceso de monumentación" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Profundidad:</label><input type="file" id="3. Profundidad" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Anclaje de disco de bronce:</label><input type="file" id="4. Anclaje de disco de bronce" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Incrustación del disco de bronce:</label><input type="file" id="5. Incrustación de disco de bronce" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Disco instalado:</label><input type="file" id="6. Disco instalado" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Medición de altura de antena:</label><input type="file" id="7. Medición de altura de antena" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Fotografías panorámicas:</label><input type="file" id="8. Fotografia panoramicas" class="form-control" multiple></div>
        <div class="mb-3"><label class="form-label">Videos:</label><input type="file" id="9. Videos" class="form-control" multiple></div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Enviar Evidencias</button>
      </form>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function uploadFile(file, codigo, campo) {
      const base64 = await toBase64(file);
      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", campo);
      formData.append("codigo", codigo);

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      if(!codigo){ alert("Debes ingresar un código"); return; }

      const campos = [
  "2. Proceso de monumentación",
  "3. Profundidad",
  "4. Anclaje de disco de bronce",
  "5. Incrustación de disco de bronce",
  "6. Disco instalado",
  "7. Medición de altura de antena",
  "8. Fotografia panoramicas",
  "9. Videos"
];


      for(const campo of campos){
        const files = Array.from(document.getElementById(campo).files);
        for(const file of files){
          const result = await uploadFile(file, codigo, campo);
          console.log(result);
        }
      }

      alert("Evidencias enviadas correctamente para el punto: " + codigo);
      document.getElementById("ignForm").reset();
    });
  </script>
</body>
</html>
