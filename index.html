<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prueba subida</title>
</head>
<body>
  <h2>Subir archivo de prueba</h2>
  <input type="file" id="archivo">
  <button onclick="enviar()">Enviar</button>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function enviar() {
      const file = document.getElementById("archivo").files[0];
      if (!file) { alert("Selecciona un archivo"); return; }

      const base64 = await toBase64(file);
      console.log("Base64 generado:", base64.substring(0,100)); // depuración

      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", "prueba");

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      alert(await res.text());
    }
  </script>
</body>
</html>
