<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Certificación IGN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', Arial, sans-serif; }
    header { background: #002b5c; color: #fff; padding: 25px; }
    header h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; }
    main { max-width: 600px; margin: 40px auto; }
    .card { border: none; box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .form-label { font-weight: 600; color: #002b5c; }
    .btn-primary { background: #002b5c; border: none; font-weight: 600; }
    .btn-primary:hover { background: #001f40; }
  </style>
</head>
<body>
  <header class="text-center">
    <h1>Certificación Geodésica IGN</h1>
    <p class="mb-0" style="font-size:0.9rem; font-weight:300;">Ingeniería, Consultoría e Investigaciones</p>
  </header>
  <main>
    <div class="card p-4">
      <h2 class="mb-4 text-primary">Subir Evidencias</h2>
      <form id="ignForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="codigo" class="form-label">Código del punto:</label>
          <input type="text" id="codigo" name="codigo" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="section" class="form-label">Selecciona la sección:</label>
          <select id="section" class="form-select" required>
            <option value="">-- Elegir sección --</option>
            <option value="Proceso de monumentación">Proceso de monumentación</option>
            <option value="Profundidad">Profundidad</option>
            <option value="Anclaje de disco de bronce">Anclaje de disco de bronce</option>
            <option value="Incrustación de disco de bronce">Incrustación de disco de bronce</option>
            <option value="Disco instalado">Disco instalado</option>
            <option value="Medición de altura de antena">Medición de altura de antena</option>
            <option value="Fotografías panorámicas">Fotografías panorámicas</option>
            <option value="Videos">Videos</option>
          </select>
        </div>

        <div id="fileInputs" class="mb-3">
          <!-- Primer input por defecto -->
          <div class="mb-2">
            <label class="form-label">Archivo 1:</label>
            <input type="file" id="file1" class="form-control" accept="image/*,video/*" capture="environment" required>
          </div>
        </div>

        <button type="button" id="addFile" class="btn btn-secondary mb-3">Añadir otra evidencia</button>
        <button type="submit" class="btn btn-primary w-100">Enviar Evidencias</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    let fileCount = 1;
    const fileInputsDiv = document.getElementById("fileInputs");
    const addFileBtn = document.getElementById("addFile");

    // Añadir inputs sin borrar los anteriores
    addFileBtn.addEventListener("click", () => {
      fileCount++;
      const div = document.createElement("div");
      div.classList.add("mb-2");
      div.innerHTML = `
        <label class="form-label">Archivo ${fileCount}:</label>
        <input type="file" id="file${fileCount}" class="form-control" accept="image/*,video/*" capture="environment" required>
      `;
      fileInputsDiv.appendChild(div);
    });

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function uploadFile(file, codigo, section) {
      const base64 = await toBase64(file);
      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", section);
      formData.append("codigo", codigo);

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      const section = document.getElementById("section").value;

      if(!codigo || !section){ 
        alert("Debes ingresar código y sección."); 
        return; 
      }

      for(let i = 1; i <= fileCount; i++){
        const fileInput = document.getElementById("file" + i);
        if(fileInput && fileInput.files.length > 0){
          const file = fileInput.files[0];
          const result = await uploadFile(file, codigo, section);
          console.log(result);
        }
      }

      alert("Evidencias enviadas correctamente para el punto: " + codigo + " → " + section);
      document.getElementById("ignForm").reset();
      fileInputsDiv.innerHTML = `
        <div class="mb-2">
          <label class="form-label">Archivo 1:</label>
          <input type="file" id="file1" class="form-control" accept="image/*,video/*" capture="environment" required>
        </div>
      `;
      fileCount = 1;
    });
  </script>
</body>
</html>
