<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisión Geodésica IGN</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background:#eef2f7; margin:0; padding:0; }
    header { background:#004aad; color:#fff; text-align:center; padding:20px; }
    header img { height:70px; margin-bottom:10px; }
    main { max-width:800px; margin:30px auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    h2 { color:#004aad; text-align:center; }
    .section { margin-bottom:25px; padding-bottom:15px; border-bottom:1px solid #eee; }
    label { font-weight:bold; display:block; margin-top:10px; }
    input[type="text"], input[type="file"] { width:100%; padding:10px; margin-top:8px; border:1px solid #ccc; border-radius:6px; }
    button { margin-top:20px; width:100%; padding:12px; background:#004aad; color:#fff; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    button:hover { background:#00337a; }
    .preview { display:flex; flex-wrap:wrap; margin-top:10px; }
    .preview img, .preview video { width:120px; margin:5px; border-radius:8px; border:2px solid #ddd; object-fit:cover; }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo Empresa">
    <h1>Supervisión Geodésica IGN</h1>
  </header>

  <main>
    <h2>Formulario de Registro</h2>
    <button id="loginBtn">Iniciar sesión con Google</button>
    <form id="ignForm">
      <div class="section">
        <label for="codigo">Código del punto:</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>

      <div class="section">
        <label>Proceso de monumentación (máx. 5 fotos):</label>
        <input type="file" id="proceso" accept="image/*" multiple>
        <div class="preview" id="previewProceso"></div>
      </div>

      <div class="section">
        <label>Videos:</label>
        <input type="file" id="videos" accept="video/*" multiple>
        <div class="preview" id="previewVideos"></div>
      </div>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <!-- Librería de Google API -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script>
    let accessToken = null;

    // Inicializar cliente con tu Client ID
    function initClient() {
      gapi.client.init({
        clientId: "518460759338-9nu8fmfuoa34bshp81eiecgcb7gqaklc.apps.googleusercontent.com",
        scope: "https://www.googleapis.com/auth/drive.file"
      }).then(() => {
        document.getElementById("loginBtn").onclick = () => {
          gapi.auth2.getAuthInstance().signIn().then(() => {
            accessToken = gapi.auth.getToken().access_token;
            alert("Sesión iniciada correctamente con Google Drive.");
          });
        };
      });
    }
    gapi.load("client:auth2", initClient);

    // Función para subir archivo a Drive
    async function uploadFile(file, folderId=null) {
      const metadata = { name: file.name, mimeType: file.type };
      if(folderId){ metadata.parents = [folderId]; }
      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], {type: "application/json"}));
      form.append("file", file);

      const response = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
        method: "POST",
        headers: new Headers({"Authorization": "Bearer " + accessToken}),
        body: form
      });
      return await response.json();
    }

    // Previews
    function setupPreview(inputId, previewId, maxFiles=5, isVideo=false){
      const input=document.getElementById(inputId);
      const preview=document.getElementById(previewId);
      input.addEventListener("change",()=>{
        preview.innerHTML="";
        const files=Array.from(input.files).slice(0,maxFiles);
        files.forEach(file=>{
          const reader=new FileReader();
          reader.onload=e=>{
            if(isVideo){
              const video=document.createElement("video");
              video.src=e.target.result; video.controls=true; video.width=200;
              preview.appendChild(video);
            } else {
              const img=document.createElement("img");
              img.src=e.target.result;
              preview.appendChild(img);
            }
          };
          reader.readAsDataURL(file);
        });
      });
    }

    setupPreview("proceso","previewProceso");
    setupPreview("videos","previewVideos",5,true);

    // Enviar formulario
    document.getElementById("ignForm").addEventListener("submit", async e=>{
      e.preventDefault();
      if(!accessToken){ alert("Primero inicia sesión con Google."); return; }
      const codigo=document.getElementById("codigo").value;
      alert("Subiendo archivos para el punto: "+codigo);

      const files=Array.from(document.getElementById("proceso").files).slice(0,5);
      for(const file of files){
        const result=await uploadFile(file,"1PJTQaPUFcv3F6bZr3JQDO5STzzW-L5oK"); // ID de tu carpeta Certificacion
        console.log("Archivo subido:",result);
      }

      const videos=Array.from(document.getElementById("videos").files).slice(0,5);
      for(const file of videos){
        const result=await uploadFile(file,"1PJTQaPUFcv3F6bZr3JQDO5STzzW-L5oK");
        console.log("Video subido:",result);
      }

      alert("Todos los archivos fueron enviados a Google Drive.");
    });
  </script>
</body>
</html>
