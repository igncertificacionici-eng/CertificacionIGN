<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supervisión Geodésica IGN</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; margin: 0; padding: 0; }
    header { background: #004aad; color: #fff; text-align: center; padding: 20px; }
    header img { height: 70px; margin-bottom: 10px; }
    main { max-width: 900px; margin: 30px auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { color: #004aad; text-align: center; }
    .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 20px; width: 100%; padding: 12px; background: #004aad; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #00337a; }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo Empresa">
    <h1>Supervisión Geodésica IGN</h1>
  </header>

  <main>
    <h2>Formulario de Registro</h2>
    <form id="ignForm">
      <div class="section">
        <label for="codigo">Código del punto:</label>
        <input type="text" id="codigo" name="codigo" required>
      </div>

      <div class="section"><label>Proceso de monumentación:</label><input type="file" id="proceso" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Profundidad:</label><input type="file" id="profundidad" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Anclaje de disco de bronce:</label><input type="file" id="anclaje" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Incrustación del disco de bronce:</label><input type="file" id="incrustacion" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Disco instalado:</label><input type="file" id="disco" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Medición de altura de antena:</label><input type="file" id="altura" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Fotografías panorámicas:</label><input type="file" id="panoramicas" accept="image/*" capture="camera" multiple></div>
      <div class="section"><label>Videos:</label><input type="file" id="videos" accept="video/*" capture="camera" multiple></div>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <script>
    const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT"; // reemplaza con tu URL de despliegue

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function uploadFile(file, codigo, campo) {
      const base64 = await toBase64(file);
      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", campo);
      formData.append("codigo", codigo);

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      if(!codigo){ alert("Debes ingresar un código"); return; }

      const campos = ["proceso","profundidad","anclaje","incrustacion","disco","altura","panoramicas","videos"];
