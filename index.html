<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supervisión Geodésica IGN</title>
</head>
<body>
  <h2>Formulario de prueba</h2>
  <form id="ignForm">
    <label for="codigo">Código del punto:</label>
    <input type="text" id="codigo" required><br><br>

    <label>Proceso de monumentación:</label>
    <input type="file" id="proceso" multiple><br><br>

    <button type="submit">Enviar</button>
  </form>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]); // solo base64
        reader.onerror = error => reject(error);
      });
    }

    async function uploadFile(file, codigo, campo) {
      const base64 = await toBase64(file);
      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", campo);
      formData.append("codigo", codigo);

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value;
      const files = Array.from(document.getElementById("proceso").files);

      for (const file of files) {
        const result = await uploadFile(file, codigo, "proceso");
        console.log(result);
      }

      alert("Archivos enviados a la carpeta Certificacion.");
    });
  </script>
</body>
</html>
