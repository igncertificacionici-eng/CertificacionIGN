<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Certificación IGN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header class="text-center bg-primary text-white p-3">
    <h1>Certificación Geodésica IGN</h1>
    <p class="mb-0">Subida de evidencias fotográficas y videos</p>
  </header>
  <main class="container mt-4">
    <div class="card p-4 shadow">
      <form id="ignForm">
        <div class="mb-3">
          <label for="codigo" class="form-label">Código del punto:</label>
          <input type="text" id="codigo" name="codigo" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="section" class="form-label">Sección:</label>
          <select id="section" name="section" class="form-select" required>
            <option value="">-- Elegir sección --</option>
            <option value="Proceso de monumentación">Proceso de monumentación</option>
            <option value="Profundidad">Profundidad</option>
            <option value="Anclaje de disco de bronce">Anclaje de disco de bronce</option>
            <option value="Incrustación de disco de bronce">Incrustación de disco de bronce</option>
            <option value="Disco instalado">Disco instalado</option>
            <option value="Medición de altura de antena">Medición de altura de antena</option>
            <option value="Fotografías panorámicas">Fotografías panorámicas</option>
            <option value="Videos">Videos</option>
          </select>
        </div>

        <div id="fileInputs" class="mb-3">
          <label class="form-label">Archivo:</label>
          <input type="file" id="file1" class="form-control" accept="image/*,video/*" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Enviar Evidencia</button>
      </form>
    </div>
  </main>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    async function uploadFile(file, codigo, section) {
      const url = SCRIPT_URL + "?codigo=" + encodeURIComponent(codigo) +
                  "&section=" + encodeURIComponent(section) +
                  "&name=" + encodeURIComponent(file.name);

      const res = await fetch(url, { method: "POST", body: file });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      const section = document.getElementById("section").value;
      const fileInput = document.getElementById("file1");

      if (!codigo || !section || fileInput.files.length === 0) {
        alert("Debes ingresar código, sección y seleccionar un archivo.");
        return;
      }

      const result = await uploadFile(fileInput.files[0], codigo, section);
      alert(result);

      document.getElementById("ignForm").reset();
    });
  </script>
</body>
</html>
