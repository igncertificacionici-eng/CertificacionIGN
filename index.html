<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supervisión Geodésica IGN1</title>
</head>
<body>
  <h2>Formulario de Registro22</h2>
  <form id="ignForm">
    <label for="codigo">Código del punto:</label>
    <input type="text" id="codigo" name="codigo" required><br><br>

    <label>Proceso de monumentación:</label>
    <input type="file" id="proceso" multiple><br><br>

    <label>Profundidad:</label>
    <input type="file" id="profundidad" multiple><br><br>

    <label>Anclaje de disco de bronce:</label>
    <input type="file" id="anclaje" multiple><br><br>

    <label>Incrustación del disco de bronce:</label>
    <input type="file" id="incrustacion" multiple><br><br>

    <label>Disco instalado:</label>
    <input type="file" id="disco" multiple><br><br>

    <label>Medición de altura de antena:</label>
    <input type="file" id="altura" multiple><br><br>

    <label>Fotografías panorámicas:</label>
    <input type="file" id="panoramicas" multiple><br><br>

    <label>Videos:</label>
    <input type="file" id="videos" multiple><br><br>

    <button type="submit">Enviar</button>
  </form>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function uploadFile(file, codigo, campo) {
      const base64 = await toBase64(file);
      const formData = new FormData();
      formData.append("file", base64);
      formData.append("name", file.name);
      formData.append("section", campo);
      formData.append("codigo", codigo);

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      return await res.text();
    }

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value;
      const campos = ["proceso","profundidad","anclaje","incrustacion","disco","altura","panoramicas","videos"];

      for(const campo of campos){
        const files = Array.from(document.getElementById(campo).files).slice(0,5);
        for(const file of files){
          const result = await uploadFile(file, codigo, campo);
          console.log(result);
        }
      }

      alert("Archivos enviados a la carpeta Certificacion → " + codigo);
    });
  </script>
</body>
</html>
