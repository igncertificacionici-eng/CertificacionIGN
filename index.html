<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Certificación IGN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #eef2f7; font-family: 'Segoe UI', Arial, sans-serif; }
    header { background: linear-gradient(90deg, #002b5c, #004080); color: #fff; padding: 20px; }
    header h1 { margin: 0; font-size: 1.6rem; font-weight: 700; }
    main { max-width: 600px; margin: 30px auto; }
    .card { border-radius: 12px; border: none; box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    .form-label { font-weight: 600; color: #002b5c; font-size: 0.95rem; }
    .btn-primary { background: #002b5c; border: none; font-weight: 600; border-radius: 8px; }
    .btn-primary:hover { background: #001f40; }
    .btn-secondary { border-radius: 8px; }
    #contador { font-size: 0.9rem; color: #555; margin-bottom: 10px; font-style: italic; }
    .flex-input { display: flex; flex-direction: column; gap: 5px; }
    @media (min-width: 768px) {
      .flex-input { flex-direction: row; align-items: center; }
      .flex-input label { width: 35%; margin-bottom: 0; }
      .flex-input input, .flex-input select { flex: 1; }
    }
  </style>
</head>
<body>
  <header class="text-center">
    <h1>Certificación Geodésica IGN</h1>
    <p class="mb-0" style="font-size:0.85rem; font-weight:300;">Subida de evidencias fotográficas y videos</p>
  </header>
  <main>
    <div class="card p-4">
      <h2 class="mb-4 text-primary" style="font-size:1.3rem;">📤 Subir Evidencias</h2>
      <form id="ignForm" class="needs-validation" novalidate>
        <div class="flex-input mb-3">
          <label for="codigo" class="form-label">🔢 Código del punto:</label>
          <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Ej. PNT-001" required>
        </div>

        <div class="flex-input mb-3">
          <label for="section" class="form-label">📂 Sección:</label>
          <select id="section" class="form-select" required>
            <option value="">-- Elegir sección --</option>
            <option value="Proceso de monumentación">Proceso de monumentación</option>
            <option value="Profundidad">Profundidad</option>
            <option value="Anclaje de disco de bronce">Anclaje de disco de bronce</option>
            <option value="Incrustación de disco de bronce">Incrustación de disco de bronce</option>
            <option value="Disco instalado">Disco instalado</option>
            <option value="Medición de altura de antena">Medición de altura de antena</option>
            <option value="Fotografías panorámicas">Fotografías panorámicas</option>
            <option value="Videos">Videos</option>
          </select>
        </div>

        <div id="contador">Actualmente tienes 1 evidencia lista para enviar.</div>

        <div id="fileInputs" class="mb-3">
          <div class="flex-input mb-2">
            <label class="form-label">📷 Archivo 1:</label>
            <input type="file" id="file1" name="file1" class="form-control" accept="image/*,video/*" capture="environment" required>
          </div>
        </div>

        <button type="button" id="addFile" class="btn btn-secondary mb-3 w-100">➕ Añadir otra evidencia</button>
        <button type="submit" class="btn btn-primary w-100">🚀 Enviar Evidencias</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk0hQbNIwiJOtedrQhDRARO6AZ3AZ0B9GHS7Z7mQDp0sSbZ1zMfKjTTWtJYCvKvtHz6Q/exec";

    let fileCount = 1;
    const fileInputsDiv = document.getElementById("fileInputs");
    const addFileBtn = document.getElementById("addFile");
    const contador = document.getElementById("contador");

    function actualizarContador() {
      contador.textContent = `Actualmente tienes ${fileCount} evidencia${fileCount > 1 ? 's' : ''} lista${fileCount > 1 ? 's' : ''} para enviar.`;
    }

    addFileBtn.addEventListener("click", () => {
      fileCount++;
      const div = document.createElement("div");
      div.classList.add("flex-input","mb-2");
      div.innerHTML = `
        <label class="form-label">📷 Archivo ${fileCount}:</label>
        <input type="file" id="file${fileCount}" name="file${fileCount}" class="form-control" accept="image/*,video/*" capture="environment" required>
      `;
      fileInputsDiv.appendChild(div);
      actualizarContador();
    });

    document.getElementById("ignForm").addEventListener("submit", async e => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      const section = document.getElementById("section").value;

      if(!codigo || !section){ 
        alert("Debes ingresar código y sección."); 
        return; 
      }

      const formData = new FormData();
      formData.append("codigo", codigo);
      formData.append("section", section);

      for(let i = 1; i <= fileCount; i++){
        const fileInput = document.getElementById("file" + i);
        if(fileInput && fileInput.files.length > 0){
          formData.append("file" + i, fileInput.files[0]);
        }
      }

      const res = await fetch(SCRIPT_URL, { method: "POST", body: formData });
      const text = await res.text();
      alert(text);

      document.getElementById("ignForm").reset();
      fileInputsDiv.innerHTML = `
        <div class="flex-input mb-2">
          <label class="form-label">📷 Archivo 1:</label>
          <input type="file" id="file1" name="file1" class="form-control" accept="image/*,video/*" capture="environment" required>
        </div>
      `;
      fileCount = 1;
      actualizarContador();
    });

    actualizarContador();
  </script>
</body>
</html>
