<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supervisión Geodésica IGN</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>Supervisión Geodésica IGN</h1>

  <!-- Botón de login -->
  <div id="g_id_onload"
       data-client_id="518460759338-9nu8fmfuoa34bshp81eiecgcb7gqaklc.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <form id="ignForm">
    <label>Código del punto:</label>
    <input type="text" id="codigo" required>
    <br><br>
    <label>Fotos (máx. 5):</label>
    <input type="file" id="proceso" accept="image/*" multiple>
    <br><br>
    <button type="submit">Enviar</button>
  </form>

  <script>
    let accessToken = null;
    const FOLDER_ID = "1PJTQaPUFcv3F6bZr3JQDO5STzzW-L5oK"; // Carpeta Certificacion

    // Callback de login
    function handleCredentialResponse(response) {
      // Aquí recibes el JWT de Google Identity Services
      console.log("Credenciales:", response);
      alert("Sesión iniciada correctamente.");
      // En este punto normalmente se intercambia el token en un backend
      // para obtener un access_token de Drive. En front-end puro no es seguro.
    }

    // Subida de archivos (requiere access_token válido)
    async function uploadFile(file) {
      const metadata = { name: file.name, mimeType: file.type, parents: [FOLDER_ID] };
      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], {type: "application/json"}));
      form.append("file", file);

      const response = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
        method: "POST",
        headers: new Headers({"Authorization": "Bearer " + accessToken}),
        body: form
      });
      return await response.json();
    }

    document.getElementById("ignForm").addEventListener("submit", async e=>{
      e.preventDefault();
      if(!accessToken){ alert("Primero inicia sesión con Google."); return; }
      const codigo=document.getElementById("codigo").value;
      alert("Subiendo archivos para el punto: "+codigo);

      const fotos=Array.from(document.getElementById("proceso").files).slice(0,5);
      for(const file of fotos){
        const result=await uploadFile(file);
        console.log("Foto subida:",result);
      }
      alert("Todos los archivos fueron enviados a Google Drive.");
    });
  </script>
</body>
</html>
